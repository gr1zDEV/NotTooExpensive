name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Determine next version
        id: version
        run: |
          CURRENT_VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEXT_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump pom.xml version
        run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.next }} -DgenerateBackupPoms=false

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }} [skip ci]"
          git tag "v${{ steps.version.outputs.next }}"
          git push origin HEAD:main --follow-tags

      - name: Build jar
        run: mvn -B clean package

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.next }}
          name: v${{ steps.version.outputs.next }}
          generate_release_notes: true
          files: target/*.jar
